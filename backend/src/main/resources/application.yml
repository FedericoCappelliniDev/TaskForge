spring:
  application:
    name: taskforge

  datasource:
    url: jdbc:postgresql://localhost:5432/taskforge
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

server:
  port: 8080
  servlet:
    context-path: /

application:
  security:
    jwt:
      # Replace with a 256-bit Base64-encoded secret in production (min 32 chars)
      secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000   # 24 h in ms
  cors:
    allowed-origins: http://localhost:4200

logging:
  level:
    com.federico.taskforge: DEBUG
    org.springframework.security: INFO
